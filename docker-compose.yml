services:
  wiregate:
    image: ghcr.io/basmulder03/wiregate:latest
    # Or build locally:
    # build: .
    container_name: wiregate
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    ports:
      - "8080:8080"       # WireGate web UI
      - "51820:51820/udp" # WireGuard VPN
    volumes:
      - wiregate_data:/var/lib/wiregate
      - wiregate_wg:/etc/wireguard
    environment:
      # Required: set a strong JWT secret
      WIREGATE_SERVER_JWT_SECRET: "change-me-to-a-random-64-char-string"
      # Optional overrides:
      # WIREGATE_SERVER_PORT: "8080"
      # WIREGATE_WIREGUARD_INTERFACE: "wg0"
      # WIREGATE_DATABASE_DSN: "/var/lib/wiregate/wiregate.db"

volumes:
  wiregate_data:
  wiregate_wg:
