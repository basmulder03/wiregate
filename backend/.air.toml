#:schema https://json.schemastore.org/any.json
# air — Go hot-reload for WireGate backend
# Invoked from the backend/ directory (see Makefile dev-backend target).

# Load dev env vars from the repo root .env.dev on every restart.
env_files = ["../.env.dev"]

root       = "."
tmp_dir    = ".air-tmp"

[build]
  cmd        = "CGO_ENABLED=1 go build -o .air-tmp/wiregate ./cmd/wiregate"
  entrypoint = [".air-tmp/wiregate"]

  # Watch all Go source under backend/
  include_dir = ["cmd", "internal"]
  include_ext = ["go"]

  # Never trigger on generated/embed/test files
  exclude_dir    = ["internal/static/ui", "vendor", "testdata"]
  exclude_regex  = ["_test\\.go"]

  delay            = 500   # ms to wait after a change before rebuilding
  kill_delay       = "2s"  # grace period before SIGKILL on the old process
  send_interrupt   = true  # send SIGINT first so the server can shut down cleanly
  stop_on_error    = false
  exclude_unchanged = false

  log = "build-errors.log"

[log]
  time      = true
  main_only = false

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[screen]
  clear_on_rebuild = false
  keep_scroll      = true

[misc]
  clean_on_exit = true
